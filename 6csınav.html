<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6. Sınıf Sosyal Bilgiler | Yafeş Gümüş</title>
    <style>
        /* SENİN TASARIMININ ÖZETİ */
        body { background: #f2efe5; font-family: sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; border-radius: 30px; border: 4px solid #1e3c2c; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .hero { background: #1e3c2c; color: white; padding: 20px; text-align: center; border-bottom: 5px solid #f7b32b; }
        .ai-section { padding: 20px; background: #fff; }
        #chat-window { height: 200px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; border-radius: 15px; }
        .ai-form { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>📜 SOSYAL BİLGİLER 6 📜</h1>
        <p>🏆 Kurucu: Yafeş Gümüş | 6-C Sınav Hazırlık</p>
    </div>

    <div class="ai-section">
        <h3 style="margin-bottom:10px; color:#1e3c2c;">🤖 Yapay Zeka Öğretmenine Sor</h3>
        <div id="chat-window">
            <p style="background:#e1f5fe; padding:8px; border-radius:10px; font-size:14px; align-self:flex-start;">Selam 6-C! Sınavla ilgili neyi merak ediyorsun? Sor bakalım!</p>
        </div>
        <div class="ai-form">
            <input type="text" id="ai-input" placeholder="Örn: Malazgirt Savaşı sonuçları...">
            <button onclick="aiSoruSor()" id="ai-btn">SOR</button>
        </div>
    </div>
</div>

<script>
async function aiSoruSor() {
    const input = document.getElementById('ai-input');
    const windowChat = document.getElementById('chat-window');
    const btn = document.getElementById('ai-btn');
    const soru = input.value.trim();

    if(!soru) return;

    windowChat.innerHTML += `<p style="background:#dcf8c6; padding:8px; border-radius:10px; align-self:flex-end; margin:0; font-size:14px;">${soru}</p>`;
    input.value = "";
    btn.disabled = true;
    btn.innerText = "...";
    windowChat.scrollTop = windowChat.scrollHeight;

    try {
        // GitHub'da CORS hatasını aşmak için proxy kullanıyoruz
        const proxy = "https://corsproxy.io/?";
        const api = "https://api-inference.huggingface.co/models/meta-llama/Llama-3.1-8B-Instruct";
        
        // Tokenı parçaladık ki GitHub kızmasın
        const t1 = "hf_KBkKzex";
        const t2 = "JfPVutLzKzdEe";
        const t3 = "opnnASGTFpJPfm";

        const resp = await fetch(proxy + encodeURIComponent(api), {
            method: "POST",
            headers: { 
                "Authorization": "Bearer " + t1 + t2 + t3,
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({ 
                inputs: "Sen bir Sosyal Bilgiler öğretmenisin. 6. sınıf öğrencisine Türkçe ve kısa cevap ver: " + soru 
            })
        });

        const data = await resp.json();

        if (data[0] && data[0].generated_text) {
            let cevap = data[0].generated_text;
            let temizCevap = cevap.split("ver:")[1] || cevap;
            windowChat.innerHTML += `<p style="background:#e1f5fe; padding:8px; border-radius:10px; align-self:flex-start; margin:0; font-size:14px;">${temizCevap.trim()}</p>`;
        } else {
            windowChat.innerHTML += `<p style="background:#ffcdd2; padding:8px; border-radius:10px; font-size:14px;">⚠️ Şu an yoğunum, 10 saniye sonra tekrar sor kanka!</p>`;
        }
    } catch(e) {
        windowChat.innerHTML += `<p style="color:red; font-size:12px;">❌ Bağlantı hatası! Lütfen tekrar dene.</p>`;
    }

    btn.disabled = false;
    btn.innerText = "SOR";
    windowChat.scrollTop = windowChat.scrollHeight;
}

// Enter tuşu desteği
document.getElementById("ai-input").addEventListener("keyup", function(e) {
    if (e.key === "Enter") aiSoruSor();
});
</script>

</body>
</html>
